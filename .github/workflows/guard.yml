name: guard
on: [push, pull_request]
jobs:
  no-private-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: state/ と config.json がコミットされていないことを確認
        run: |
          bad=$(git ls-files | grep -E '^state/.+' | grep -v '^state/\.gitkeep$' || true)
          if [ -n "$bad" ]; then echo "::error::state/ 配下がコミットされています:"; echo "$bad"; exit 1; fi
          if git ls-files | grep -qx 'config.json'; then echo "::error::config.json がコミットされています"; exit 1; fi
          echo "OK: 議論データ・ローカル設定は含まれていません"
